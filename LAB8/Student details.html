<!DOCTYPE html>
<html lang="en">
<head>
<title>Student Object Program</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
    text-align:center;
    width:330px;
}

h2{
    color:#ff5e62;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background: linear-gradient(to right,#36d1dc,#5b86e5);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    transform:scale(1.1);
}

#result{
    margin-top:20px;
    background:#f3f3f3;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    color:#333;

    word-wrap:break-word;
    overflow-wrap:break-word;
    white-space:normal;
}

</style>
</head>

<body>

<div class="container">

<h2>Student Object Details</h2>

<input type="number" id="id" placeholder="Enter ID">
<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="dept" placeholder="Enter Department">
<input type="number" id="marks" placeholder="Enter Marks">

<button onclick="showData()">Show Details</button>

<div id="result"></div>

</div>

<script>

function showData(){

    const student = {
        id: Number(document.getElementById("id").value),
        name: document.getElementById("name").value,
        department: document.getElementById("dept").value,
        marks: Number(document.getElementById("marks").value)
    };

    /* Object Destructuring */
    const {id, name, department, marks} = student;

    /* Grade Logic */
    let grade = "";
    if(marks >= 90) grade = "A";
    else if(marks >= 75) grade = "B";
    else if(marks >= 50) grade = "C";
    else grade = "Fail";

    /* Spread Operator */
    const updatedStudent = {
        ...student,
        grade: grade
    };

    document.getElementById("result").innerHTML =
    `Destructured Values:<br>
     ${id} ${name} ${department} ${marks}
     <br><br>
     Updated Object:<br>
     ${JSON.stringify(updatedStudent)}`;

}

</script>

</body>
</html>
